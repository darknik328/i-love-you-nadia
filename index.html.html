<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Надя, я тебя люблю</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #050509;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: #fff;
        }

        #canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        .center-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 44px;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 12px #ff315f, 0 0 30px #ff315f;
            pointer-events: none;
            z-index: 2;
        }

        .next-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 28px;
            background: #ff315f;
            color: white;
            text-decoration: none;
            border-radius: 999px;
            font-size: 18px;
            font-weight: 700;
            box-shadow: 0 0 20px rgba(255, 49, 95, 0.45);
            z-index: 3;
        }

        .next-btn:hover {
            background: #ff4e77;
        }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="center-text">Надя я тебя люблю</div>
<a class="next-btn" href="card.html">Открыть открытку</a>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', () => {
        resize();
        generateHeartPoints();
    });

    const phrase = 'Надя я тебя люблю ';
    const points = [];
    const step = 0.05;

    function generateHeartPoints() {
        points.length = 0;
        const w = canvas.width;
        const h = canvas.height;
        const scale = Math.min(w, h) / 28;

        for (let t = 0; t < Math.PI * 2; t += step) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            points.push({
                x: w / 2 + x * scale,
                y: h / 2 - y * scale
            });
        }
    }

    generateHeartPoints();

    let time = 0;

    function draw() {
        time += 0.03;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < points.length; i++) {
            const p = points[i];
            const alpha = 0.5 + 0.5 * Math.sin(time + i * 0.25);
            const fontSize = 13 + 5 * Math.sin(time + i * 0.4);

            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.fillStyle = `rgba(255, 40, 70, ${alpha})`;
            ctx.font = `bold ${fontSize}px monospace`;
            ctx.fillText(phrase, -phrase.length * fontSize / 4, 0);
            ctx.restore();
        }

        requestAnimationFrame(draw);
    }

    draw();
</script>
</body>
</html>
